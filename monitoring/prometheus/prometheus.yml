global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'carinsight'
    replica: '{{.ExternalURL}}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # Prometheus self-monitoring
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ==========================================================================
  # CarInsight Application
  # ==========================================================================
  - job_name: 'carinsight-app'
    static_configs:
      # Para desenvolvimento local
      - targets: ['host.docker.internal:3000']
        labels:
          environment: 'development'
      
      # Para produção (substitua pela URL real)
      # - targets: ['seu-app.railway.app']
      #   labels:
      #     environment: 'production'
    
    metrics_path: /admin/prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    
    # Se usar autenticação no endpoint
    # basic_auth:
    #   username: admin
    #   password: sua-senha

  # ==========================================================================
  # Node Exporter (métricas do host)
  # ==========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics

  # ==========================================================================
  # Redis Exporter
  # ==========================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics

  # ==========================================================================
  # PostgreSQL Exporter
  # ==========================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics

version: '3.8'

# =============================================================================
# Prometheus + Grafana Stack para Monitoramento
# =============================================================================
#
# Uso:
#   docker-compose -f docker-compose.monitoring.yml up -d
#
# Acessos:
#   - Prometheus: http://localhost:9090
#   - Grafana: http://localhost:3000 (admin/admin)
#
# Configuração do app:
#   1. App expõe métricas em /admin/prometheus
#   2. Prometheus scrapa a cada 15s
#   3. Grafana consome do Prometheus

services:
  # ==========================================================================
  # Prometheus - Coleta e armazena métricas
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: carinsight-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - monitoring

  # ==========================================================================
  # Grafana - Visualização de métricas
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: carinsight-grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ==========================================================================
  # Node Exporter - Métricas do host (CPU, memória, disco)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: carinsight-node-exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  # ==========================================================================
  # Redis Exporter - Métricas do Redis (opcional, se usar Redis)
  # ==========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.54.0
    container_name: carinsight-redis-exporter
    restart: unless-stopped
    ports:
      - '9121:9121'
    environment:
      - REDIS_ADDR=redis://carinsight-redis:6379
    networks:
      - monitoring
    depends_on:
      - redis

  # ==========================================================================
  # PostgreSQL Exporter - Métricas do banco (opcional)
  # ==========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: carinsight-postgres-exporter
    restart: unless-stopped
    ports:
      - '9187:9187'
    environment:
      - DATA_SOURCE_NAME=postgresql://faciliauto:faciliauto2025@carinsight-postgres-vector:5432/faciliauto_mvp?sslmode=disable
    networks:
      - monitoring

  # ==========================================================================
  # Redis (para rate limiting) - reutiliza do docker-compose.db.yml
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: carinsight-redis
    ports:
      - '6379:6379'
    networks:
      - monitoring
    volumes:
      - redis-data:/data

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  redis-data:
